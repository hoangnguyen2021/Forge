config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    active: true
    allowedLines: 120
  LongParameterList:
    active: true
    allowedFunctionParameters: 15
    allowedConstructorParameters: 8
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: true
    allowedFunctionsPerObject: 50
    ignoreAnnotatedFunctions:
      - Preview

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'

style:
  MagicNumber:
    active: true
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  UnusedPrivateFunction:
    active: true
    ignoreAnnotated:
      - Preview
  ReturnCount:
    active: true
    max: 4
